name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: Ruby ${{ matrix.ruby-version }}, ${{ matrix.gemfile }}, PG ${{ matrix.postgres-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby-version: '3.2'
            gemfile: rails_7.2
            postgres-version: 16
          - ruby-version: '3.2'
            gemfile: rails_8.0
            postgres-version: 16

          - ruby-version: '3.3'
            gemfile: rails_8.0
            postgres-version: 16
          - ruby-version: '3.3'
            gemfile: rails_8.1
            postgres-version: 16

          - ruby-version: '3.4'
            gemfile: rails_8.1
            postgres-version: 16

          - ruby-version: '4.0'
            gemfile: rails_8.1
            postgres-version: 16

    env:
      BUNDLE_GEMFILE: gemfiles/${{ matrix.gemfile }}.gemfile
      EACO_AR_CONFIG: ./features/active_record.github.yml
      CUCUMBER_PUBLISH_QUIET: "true"

    steps:
      - uses: actions/checkout@v6

      - uses: ankane/setup-postgres@v1
        with:
          postgres-version: ${{ matrix.postgres-version }}
          database: eaco

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Run Specs
        run: |
          bundle exec rspec

      - name: Run Cucumber features
        run: |
          bundle exec cucumber -f pretty
